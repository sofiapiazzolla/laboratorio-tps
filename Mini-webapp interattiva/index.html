<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechShowroom</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <nav class="nav">
    <h1 class="logo">TechShowroom</h1>

    <button class="hamburger" aria-label="Apri menu" aria-expanded="false">
      ☰
    </button>

    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#catalogo">Catalogo</a></li>
      <li><a href="#preferiti">Preferiti</a></li>
      <li><button id="themeToggle" aria-label="Cambia tema">🌙</button></li>
    </ul>
  </nav>
</header>

<main>

  <section id="home" class="section">
    <h2>Benvenuto nello Showroom</h2>
    <p>Scopri i migliori prodotti tech selezionati.</p>
  </section>

  <section id="catalogo" class="section">
    <h2>Catalogo</h2>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Cerca prodotto..." aria-label="Cerca prodotto">

      <select id="sortSelect" aria-label="Ordina prodotti">
        <option value="">Ordina per</option>
        <option value="name">Nome</option>
        <option value="price">Prezzo</option>
      </select>

      <button id="resetFilters">Reset</button>
    </div>

    <div id="productList" class="grid"></div>

    <button id="loadMore">Carica altri</button>
  </section>

  <section id="preferiti" class="section">
    <h2>Preferiti</h2>
    <div id="favoritesList" class="grid"></div>
  </section>

</main>

<footer class="footer">
  <p>© 2026 TechShowroom</p>
</footer>

<div id="modal" class="modal" aria-hidden="true">
  <div class="modal-content" role="dialog" aria-modal="true">
    <button id="closeModal" aria-label="Chiudi">X</button>
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast" class="toast" role="alert"></div>

<script src="script.js"></script>
</body>
</html>
