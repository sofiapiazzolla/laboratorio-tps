<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventFlow</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="header">
    <nav class="navbar">

      <h1 class="logo">EventFlow</h1>

      <button class="menu-btn" aria-label="Apri menu">
        ☰
      </button>

      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#events">Eventi</a></li>
        <li><a href="#profile">Profilo</a></li>
      </ul>

    </nav>
  </header>

  <main>

    <!-- HERO -->
    <section id="home" class="hero">
      <h2>Agenda Eventi & Corsi</h2>
      <p>Organizza i tuoi eventi preferiti.</p>

      <button id="theme-toggle">
        🌙 Tema
      </button>
    </section>

    <!-- FILTRI -->
    <section id="events" class="filters-section">

      <div class="filters">

        <input
          type="text"
          id="search"
          placeholder="Cerca evento..."
          aria-label="Cerca evento"
        />

        <select id="category-filter" aria-label="Filtra categoria">
          <option value="all">Tutte</option>
          <option value="Design">Design</option>
          <option value="Development">Development</option>
          <option value="Marketing">Marketing</option>
        </select>

        <select id="sort-filter" aria-label="Ordina eventi">
          <option value="default">Ordina</option>
          <option value="name">Nome</option>
          <option value="date">Data</option>
        </select>

        <button id="reset-btn">
          Reset
        </button>

      </div>

      <!-- EVENTI -->
      <div class="events-grid" id="events-container"></div>

      <div class="load-more-container">
        <button id="load-more-btn">
          Carica altri
        </button>
      </div>

    </section>

    <!-- PROFILO -->
    <section id="profile" class="profile-section">

      <h2>I tuoi preferiti</h2>

      <div id="favorites-container"></div>

    </section>

  </main>

  <!-- MODALE -->
  <div class="modal hidden" id="modal">

    <div class="modal-content">

      <button class="close-modal" id="close-modal">
        ✕
      </button>

      <h2 id="modal-title"></h2>

      <p id="modal-date"></p>

      <p id="modal-category"></p>

      <button id="join-btn">
        Iscriviti
      </button>

    </div>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast">
    Evento salvato!
  </div>

  <script src="script.js"></script>
</body>
</html>
