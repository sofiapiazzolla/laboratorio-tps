<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario - Boutique Eventi & Corsi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="nav-container">
      <a href="index.html" class="logo">Boutique Eventi</a>
      <button class="hamburger" id="hamburger" aria-label="Apri menu">☰</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html" style="color: var(--accent-gold);">Calendario Eventi</a></li>
        <li><a href="profile.html">La Mia Agenda</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>I Nostri Corsi ed Eventi</h2>
    <p style="margin-bottom: 2rem;">Filtra e trova l'esperienza perfetta per te.</p>

    <section class="controls">
      <input type="text" id="search" placeholder="Cerca evento..." aria-label="Cerca evento">
      
      <select id="category" aria-label="Filtra per categoria">
        <option value="all">Tutte le Categorie</option>
        <option value="beauty">Beauty & Make-up</option>
        <option value="creativita">Creatività & Arte</option>
        <option value="wellness">Wellness & Benessere</option>
      </select>

      <select id="sort" aria-label="Ordina risultati">
        <option value="date-asc">Data (Più vicini)</option>
        <option value="date-desc">Data (Più lontani)</option>
        <option value="name">Nome (A-Z)</option>
      </select>
    </section>

    <section class="events-grid" id="events-grid" aria-live="polite">
      </section>
  </main>

  <div class="modal-overlay" id="registration-modal" role="dialog" aria-modal="true" aria-labelledby="modal-event-title">
    <div class="modal-content">
      <button class="close-modal" aria-label="Chiudi modale">✖</button>
      <h3 id="modal-event-title" style="margin-bottom: 1.5rem; text-align: center;">Iscrizione</h3>
      <form id="registration-form" novalidate>
        <div class="form-group">
          <label for="user-name">Nome e Cognome</label>
          <input type="text" id="user-name" placeholder="Es. Giulia Bianchi" required>
          <span class="error-msg">Inserisci il tuo nome.</span>
        </div>
        <div class="form-group">
          <label for="user-email">Indirizzo Email</label>
          <input type="email" id="user-email" placeholder="giulia@example.com" required>
          <span class="error-msg">Inserisci un'email valida.</span>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Conferma Iscrizione</button>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <footer>
    <p>&copy; 2026 Boutique Eventi & Corsi.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
